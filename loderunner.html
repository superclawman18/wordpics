<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lode Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #111;
            color: #0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }
        h1 { color: #ff0; margin-bottom: 10px; }
        canvas {
            background: #000;
            border: 3px solid #444;
            image-rendering: pixelated;
        }
        .ui {
            display: flex;
            gap: 20px;
            margin: 10px 0;
            font-size: 1.2rem;
        }
        .controls {
            color: #888;
            font-size: 0.9rem;
            text-align: center;
        }
        kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            color: #fff;
        }
    </style>
</head>
<body>
    <h1>🏃 LODE RUNNER</h1>
    <div class="ui">
        <div>Level: <span id="level">1</span></div>
        <div>Gold: <span id="gold">0</span></div>
        <div>Lives: <span id="lives">❤️❤️❤️</span></div>
    </div>
    <canvas id="game" width="560" height="480"></canvas>
    <div class="controls">
        <kbd>←</kbd><kbd>→</kbd> Move &nbsp;
        <kbd>↑</kbd><kbd>↓</kbd> Climb &nbsp;
        <kbd>Z</kbd> Dig Left &nbsp;
        <kbd>X</kbd> Dig Right
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const TILE = 20;
        const COLS = 28;
        const ROWS = 24;
        
        // Tile types
        const EMPTY = 0, BRICK = 1, CONCRETE = 2, LADDER = 3, ROPE = 4, GOLD = 5;
        
        // Simple level - just bricks, ladders, gold
        const level1 = [
            "1111111111111111111111111111",
            "1000000000000000000000000001",
            "1000000000000000000000000001",
            "1000000000000000000000000001",
            "1000000000000000000000000001",
            "1000000000000000000000000001",
            "1000001111111000000111111001",
            "1000001000001000000100001001",
            "1000001000001000000100001001",
            "1000001000001000000100001001",
            "1000111000001000000100001111",
            "1000000000001000000100000001",
            "1000000000001000000100000001",
            "1111000000000300000030000011",
            "1000000000000300000030000001",
            "1000000000000300000030000001",
            "1000000000000000000000000001",
            "1000000000000000000000000001",
            "1000000000000000000000000001",
            "1000000000000000000000000001",
            "1000000000000000000000000001",
            "1111111111111111111111111111",
            "1111111111111111111111111111",
            "1111111111111111111111111111",
        ];
        
        let map = [];
        let goldTotal = 0, goldCollected = 0;
        let lives = 3;
        
        // Player: x,y in tile coordinates
        let player = { x: 2, y: 20, onGround: false };
        
        let enemies = [];
        let holes = []; // {x, y, timer}
        
        const keys = {};
        
        // Load level
        function loadLevel() {
            map = [];
            goldTotal = 0;
            goldCollected = 0;
            enemies = [];
            holes = [];
            
            for (let y = 0; y < ROWS; y++) {
                map[y] = [];
                for (let x = 0; x < COLS; x++) {
                    const c = level1[y]?.[x] || '0';
                    map[y][x] = parseInt(c);
                    if (map[y][x] === GOLD) goldTotal++;
                }
            }
            
            // Add some gold if none
            if (goldTotal < 3) {
                map[6][14] = GOLD;
                map[8][10] = GOLD;
                map[10][18] = GOLD;
                goldTotal = 3;
            }
            
            player = { x: 2, y: 20, onGround: false };
            enemies = [{ x: 15, y: 5 }, { x: 20, y: 8 }];
            
            // Debug: log brick positions
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (map[y][x] === BRICK) console.log('brick at', x, y);
                }
            }
            
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('gold').textContent = goldCollected + '/' + goldTotal;
            document.getElementById('lives').textContent = '❤️'.repeat(lives);
        }
        
        function getTile(x, y) {
            const tx = Math.floor(x), ty = Math.floor(y);
            if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) return CONCRETE;
            return map[ty][tx];
        }
        
        function isSolid(x, y) {
            const t = getTile(x, y);
            return t === BRICK || t === CONCRETE;
        }
        
        // Input
        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','z','x','Z','X'].includes(e.key)) {
                e.preventDefault();
            }
        });
        document.addEventListener('keyup', e => keys[e.key] = false);
        
        function update() {
            if (lives <= 0) {
                alert('Game Over!');
                lives = 3;
                loadLevel();
                return;
            }
            
            // Movement
            let dx = 0, dy = 0;
            if (keys['ArrowLeft']) dx = -1;
            if (keys['ArrowRight']) dx = 1;
            if (keys['ArrowUp']) dy = -1;
            if (keys['ArrowDown']) dy = 1;
            
            const px = player.x;
            const py = player.y;
            
            // Check if near ladder (more lenient)
            const tileHere = getTile(px, py);
            const tileAbove = getTile(px, py - 0.5);
            const onLadder = tileHere === LADDER || tileAbove === LADDER;
            
            // Horizontal move
            if (dx !== 0) {
                const newX = px + dx * 0.15;
                if (!isSolid(newX, py - 0.5) && !isSolid(newX, py + 0.4)) {
                    player.x = newX;
                }
            }
            
            // Vertical move - can climb if on ladder OR can climb if pressing up and near ladder
            const canClimb = onLadder || (dy < 0 && (tileHere === LADDER || tileAbove === LADDER));
            
            if (canClimb && dy !== 0) {
                player.y += dy * 0.15;
                player.onGround = false;
            } else if (!canClimb) {
                // Gravity
                if (!isSolid(px, py + 0.5) && !isSolid(px - 0.3, py + 0.5) && !isSolid(px + 0.3, py + 0.5)) {
                    player.y += 0.15;
                    player.onGround = false;
                } else {
                    player.onGround = true;
                }
            }
            
            // Clamp
            player.x = Math.max(0, Math.min(COLS - 1, player.x));
            player.y = Math.max(0, Math.min(ROWS - 1, player.y));
            
            // Collect gold
            if (getTile(player.x, player.y) === GOLD) {
                map[Math.floor(player.y)][Math.floor(player.x)] = EMPTY;
                goldCollected++;
                updateUI();
                
                if (goldCollected >= goldTotal) {
                    alert('Level Complete!');
                    loadLevel();
                }
            }
            
            // Digging - can dig if standing next to a brick
            const canDig = player.onGround || getTile(player.x, player.y) === LADDER;
            console.log('dig: onGround=' + player.onGround + ' canDig=' + canDig + ' z=' + keys['z'] + ' px=' + player.x + ' py=' + player.y);
            
            if ((keys['z'] || keys['Z']) && canDig) {
                const hx = Math.floor(player.x) - 1;
                const hy = Math.floor(player.y);
                console.log('try dig left: hx=' + hx + ' hy=' + hy + ' tile=' + map[hy]?.[hx]);
                if (hx >= 0 && map[hy] && map[hy][hx] === BRICK && !holes.some(h => h.x === hx && h.y === hy)) {
                    holes.push({ x: hx, y: hy, timer: 300 });
                    map[hy][hx] = EMPTY;
                }
            }
            if ((keys['x'] || keys['X']) && canDig) {
                const hx = Math.floor(player.x) + 1;
                const hy = Math.floor(player.y);
                if (hx < COLS && map[hy] && map[hy][hx] === BRICK && !holes.some(h => h.x === hx && h.y === hy)) {
                    holes.push({ x: hx, y: hy, timer: 300 });
                    map[hy][hx] = EMPTY;
                }
            }
            
            // Update holes
            holes = holes.filter(h => {
                h.timer--;
                if (h.timer <= 0) {
                    map[h.y][h.x] = BRICK;
                    return false;
                }
                return true;
            });
            
            // Simple enemy movement
            enemies.forEach(e => {
                // Fall
                if (!isSolid(e.x, e.y + 0.5) && !isSolid(e.x - 0.3, e.y + 0.5) && !isSolid(e.x + 0.3, e.y + 0.5)) {
                    e.y += 0.05;
                }
                // Move toward player
                if (player.x > e.x + 0.5 && !isSolid(e.x + 1, e.y - 0.5) && !isSolid(e.x + 1, e.y + 0.4)) e.x += 0.03;
                if (player.x < e.x - 0.5 && !isSolid(e.x - 1, e.y - 0.5) && !isSolid(e.x - 1, e.y + 0.4)) e.x -= 0.03;
                
                // Catch player
                if (Math.abs(player.x - e.x) < 0.7 && Math.abs(player.y - e.y) < 0.7) {
                    lives--;
                    loadLevel();
                }
            });
        }
        
        function draw() {
            // Clear
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw map
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const t = map[y][x];
                    const px = x * TILE, py = y * TILE;
                    
                    if (t === BRICK) {
                        ctx.fillStyle = '#c44';
                        ctx.fillRect(px, py, TILE, TILE);
                        ctx.fillStyle = '#a33';
                        ctx.fillRect(px + 2, py + 2, TILE - 4, TILE - 4);
                    } else if (t === CONCRETE) {
                        ctx.fillStyle = '#666';
                        ctx.fillRect(px, py, TILE, TILE);
                    } else if (t === LADDER) {
                        ctx.fillStyle = '#a52';
                        for (let i = 0; i < 4; i++) {
                            ctx.fillRect(px + 4, py + i * 5, 2, 6);
                            ctx.fillRect(px + 14, py + i * 5, 2, 6);
                        }
                        for (let i = 0; i < 5; i++) {
                            ctx.fillRect(px + 2, py + i * 4, TILE - 4, 2);
                        }
                    } else if (t === GOLD) {
                        ctx.fillStyle = '#ff0';
                        ctx.beginPath();
                        ctx.arc(px + 10, py + 10, 6, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            
            // Draw holes
            holes.forEach(h => {
                ctx.fillStyle = '#000';
                ctx.fillRect(h.x * TILE, h.y * TILE, TILE, TILE);
            });
            
            // Draw player
            ctx.fillStyle = '#0ff';
            ctx.fillRect(player.x * TILE + 4, player.y * TILE + 4, 12, 14);
            ctx.fillStyle = '#ffdbac';
            ctx.fillRect(player.x * TILE + 5, player.y * TILE + 2, 10, 4);
            
            // Draw enemies
            ctx.fillStyle = '#f0f';
            enemies.forEach(e => {
                ctx.fillRect(e.x * TILE + 3, e.y * TILE + 3, 14, 14);
            });
        }
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        loadLevel();
        loop();
    </script>
</body>
</html>
